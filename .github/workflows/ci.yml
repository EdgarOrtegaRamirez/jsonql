name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          check-latest: true
      - name: Vet
        run: go vet ./...
      - name: Format
        run: |
          go fmt ./...
          git diff --exit-code || (echo "Files not formatted. Run 'go fmt ./...'" && exit 1)

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24", "1.25"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Test
        run: go test ./... -count=1 -v
      - name: Build
        run: go build ./cmd/jsonql/
